name: release

# Build per-platform bundles and attach them to the GitHub release for the
# pushed tag. Each bundle is dygi + the dictionary + the plugin files, matching
# what Formula/dygi.rb and the Claude Code plugin expect.
on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    name: build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: darwin-arm64
            os: macos-14
            target: aarch64-apple-darwin
          - name: darwin-x64
            os: macos-13
            target: x86_64-apple-darwin
          - name: linux-x64
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - name: linux-arm64
            os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust target
        run: rustup target add ${{ matrix.target }}

      - name: Build
        working-directory: crate
        run: cargo build --release --target ${{ matrix.target }}

      - name: Stage bundle
        env:
          VER: ${{ github.ref_name }}
          NAME: ${{ matrix.name }}
          TARGET: ${{ matrix.target }}
        run: |
          set -euo pipefail
          ver="${VER#v}"                      # strip leading 'v'
          pkg="dygi-${ver}-${NAME}"
          mkdir -p "dist/$pkg"
          cp "crate/target/${TARGET}/release/dygi" "dist/$pkg/dygi"
          cp crate/data/freq_dict_en.txt "dist/$pkg/"
          cp -r hooks commands .claude-plugin "dist/$pkg/"
          # macOS strips the adhoc signature on copy; re-sign so the kernel
          # does not SIGKILL the binary on launch.
          if [[ "$NAME" == darwin-* ]]; then
            codesign --force --sign - "dist/$pkg/dygi"
          fi
          tar -C dist -czf "dist/$pkg.tar.gz" "$pkg"
          shasum -a 256 "dist/$pkg.tar.gz" | tee "dist/$pkg.tar.gz.sha256"

      - name: Upload to release
        env:
          GH_TOKEN: ${{ github.token }}
          VER: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          ver="${VER#v}"
          gh release upload "$VER" \
            "dist/dygi-${ver}-${{ matrix.name }}.tar.gz" \
            "dist/dygi-${ver}-${{ matrix.name }}.tar.gz.sha256" \
            --clobber
